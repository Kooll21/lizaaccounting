<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Liza Accounting</title>
</head>
<body>

<h2>Регистрация</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Пароль">
<button id="registerBtn">Зарегистрироваться</button>

<h2>Логин</h2>
<button id="loginBtn">Войти</button>

<p id="authStatus"></p>

<hr>

<h2>Новая фактура</h2>

<input type="text" id="invoiceNumber" placeholder="Номер фактуры"><br><br>

<label>Дата выставления:</label>
<input type="date" id="issueDate"><br><br>

<label>Срок оплаты:</label>
<input type="date" id="dueDate"><br><br>

<h3>Клиент</h3>
<input type="text" id="firstName" placeholder="Имя"><br>
<input type="text" id="lastName" placeholder="Фамилия"><br>
<input type="text" id="company" placeholder="Компания (если есть)"><br><br>

<input type="text" id="street" placeholder="Улица и номер"><br><br>
<input type="text" id="city" placeholder="Город"><br><br>
<input type="text" id="zip" placeholder="Индекс"><br><br>
<input type="text" id="country" placeholder="Страна"><br><br>
<input type="text" id="vatId" placeholder="VAT / ICO"><br><br>

<hr>

<h3>Добавить услугу</h3>

<input type="text" id="serviceName" placeholder="Название услуги">
<input type="number" id="serviceQty" placeholder="Количество" value="1">
<input type="number" id="servicePrice" placeholder="Цена">
<button id="addItemBtn">Добавить</button>
  

<br><br>

<table border="1" id="itemsTable">
  <thead>
    <tr>
      <th>Услуга</th>
      <th>Кол-во</th>
      <th>Цена</th>
      <th>Сумма</th>
      <th>Удалить</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<br>

<label>НДС %:</label>
<input type="number" id="vatPercent" value="21"><br><br>

<p>Subtotal: <span id="subtotal">0</span></p>
<p>VAT: <span id="vatAmount">0</span></p>
<p>Total: <span id="totalAmount">0</span></p>

<br>

<button id="createInvoiceBtn">Создать фактуру</button>

<p id="invoiceStatusMessage"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, addDoc } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNuCWtVCpC2HmkncirONfPEUpICHAFJc0",
  authDomain: "lizaaccounting-d48b7.firebaseapp.com",
  projectId: "lizaaccounting-d48b7",
  storageBucket: "lizaaccounting-d48b7.firebasestorage.app",
  messagingSenderId: "407944794362",
  appId: "1:407944794362:web:c646f7670a8717a3fab943"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let items = [];


// =========================
// 🔐 AUTH SECTION
// =========================

// Слушатель состояния авторизации
onAuthStateChanged(auth, (user) => {
  const status = document.getElementById("authStatus");

  if (user) {
    status.textContent = "Вы вошли как: " + user.email;
  } else {
    status.textContent = "Вы не вошли в систему";
  }
});

// Регистрация
document.getElementById("registerBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await createUserWithEmailAndPassword(auth, email, password);
  } catch (error) {
    document.getElementById("authStatus").textContent = error.message;
  }
});

// Логин
document.getElementById("loginBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (error) {
    document.getElementById("authStatus").textContent = error.message;
  }
});


// =========================
// 💼 INVOICE LOGIC (ТВОЙ КОД БЕЗ ИЗМЕНЕНИЙ)
// =========================

function renderItems() {
  const tbody = document.querySelector("#itemsTable tbody");
  tbody.innerHTML = "";

  items.forEach((item, index) => {
    const row = `
      <tr>
        <td>${item.name}</td>
        <td>${item.quantity}</td>
        <td>${item.price}</td>
        <td>${item.total}</td>
        <td><button onclick="removeItem(${index})">X</button></td>
      </tr>
    `;
    tbody.innerHTML += row;
  });

  calculateTotals();
}

window.removeItem = function(index) {
  items.splice(index, 1);
  renderItems();
};

function calculateTotals() {
  const subtotal = items.reduce((sum, item) => sum + item.total, 0);
  const vatPercent = Number(document.getElementById("vatPercent").value) || 0;
  const vatAmount = subtotal * vatPercent / 100;
  const total = subtotal + vatAmount;

  document.getElementById("subtotal").textContent = subtotal.toFixed(2);
  document.getElementById("vatAmount").textContent = vatAmount.toFixed(2);
  document.getElementById("totalAmount").textContent = total.toFixed(2);
}

document.getElementById("addItemBtn").addEventListener("click", () => {
  const name = document.getElementById("serviceName").value;
  const qty = Number(document.getElementById("serviceQty").value);
  const price = Number(document.getElementById("servicePrice").value);

  if (!name || !price) return;

  const total = qty * price;

  items.push({ name, quantity: qty, price, total });

  renderItems();

  document.getElementById("serviceName").value = "";
  document.getElementById("serviceQty").value = 1;
  document.getElementById("servicePrice").value = "";
});

document.getElementById("vatPercent").addEventListener("input", calculateTotals);

document.getElementById("createInvoiceBtn").addEventListener("click", async () => {

  const user = auth.currentUser;
  if (!user) {
    alert("Войдите в систему");
    return;
  }

  const subtotal = items.reduce((sum, item) => sum + item.total, 0);
  const vatPercent = Number(document.getElementById("vatPercent").value) || 0;
  const vatAmount = subtotal * vatPercent / 100;
  const total = subtotal + vatAmount;

  const clientData = {
    firstName: document.getElementById("firstName").value,
    lastName: document.getElementById("lastName").value,
    company: document.getElementById("company").value,
    street: document.getElementById("street").value,
    city: document.getElementById("city").value,
    zip: document.getElementById("zip").value,
    country: document.getElementById("country").value,
    vatId: document.getElementById("vatId").value
  };

  const invoiceData = {
    invoiceNumber: document.getElementById("invoiceNumber").value,
    issueDate: document.getElementById("issueDate").value,
    dueDate: document.getElementById("dueDate").value,
    client: clientData,
    items,
    subtotal,
    vatPercent,
    vatAmount,
    total,
    createdAt: new Date()
  };

  await addDoc(collection(db, "users", user.uid, "invoices"), invoiceData);

  document.getElementById("invoiceStatusMessage").textContent = "Фактура создана ✅";
});

</script>
  

</body>
</html>
