<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Liza Accounting</title>
</head>
<body>

<h2>Регистрация</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Пароль">
<button id="registerBtn">Зарегистрироваться</button>

<h2>Логин</h2>
<button id="loginBtn">Войти</button>

<p id="authStatus"></p>

<hr>

<h2>Новая фактура</h2>

<input type="text" id="invoiceNumber" placeholder="Номер фактуры"><br><br>

<label>Дата выставления:</label>
<input type="date" id="issueDate"><br><br>

<label>Срок оплаты:</label>
<input type="date" id="dueDate"><br><br>

<h3>Данные клиента</h3>

<input type="text" id="firstName" placeholder="Имя"><br><br>
<input type="text" id="lastName" placeholder="Фамилия"><br><br>
<input type="text" id="company" placeholder="Компания (если есть)"><br><br>

<input type="text" id="street" placeholder="Улица и номер"><br><br>
<input type="text" id="city" placeholder="Город"><br><br>
<input type="text" id="zip" placeholder="Индекс"><br><br>
<input type="text" id="country" placeholder="Страна"><br><br>
<input type="text" id="vatId" placeholder="VAT / ICO"><br><br>

<hr>

<input type="number" id="subtotal" placeholder="Сумма без НДС"><br><br>
<input type="number" id="vat" placeholder="НДС"><br><br>
<input type="number" id="total" placeholder="Итого" readonly><br><br>

<select id="invoiceStatus">
  <option value="draft">Черновик</option>
  <option value="sent">Отправлена</option>
  <option value="paid">Оплачена</option>
</select><br><br>

<button id="createInvoiceBtn">Создать фактуру</button>

<p id="invoiceStatusMessage"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword, 
  onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { 
  getFirestore, 
  doc, 
  setDoc, 
  collection, 
  addDoc 
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBNuCWtVCpC2HmkncirONfPEUpICHAFJc0",
    authDomain: "lizaaccounting-d48b7.firebaseapp.com",
    projectId: "lizaaccounting-d48b7",
    storageBucket: "lizaaccounting-d48b7.firebasestorage.app",
    messagingSenderId: "407944794362",
    appId: "1:407944794362:web:c646f7670a8717a3fab943"
  };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const authStatus = document.getElementById("authStatus");
const invoiceStatusMessage = document.getElementById("invoiceStatusMessage");

document.getElementById("registerBtn").addEventListener("click", async () => {
  try {
    const userCredential = await createUserWithEmailAndPassword(
      auth,
      document.getElementById("email").value,
      document.getElementById("password").value
    );

    await setDoc(doc(db, "users", userCredential.user.uid), {
      email: userCredential.user.email,
      createdAt: new Date()
    });

    authStatus.textContent = "Регистрация успешна ✅";
  } catch (error) {
    authStatus.textContent = error.message;
  }
});

document.getElementById("loginBtn").addEventListener("click", async () => {
  try {
    await signInWithEmailAndPassword(
      auth,
      document.getElementById("email").value,
      document.getElementById("password").value
    );

    authStatus.textContent = "Вход выполнен ✅";
  } catch (error) {
    authStatus.textContent = error.message;
  }
});

onAuthStateChanged(auth, (user) => {
  if (user) {
    console.log("Пользователь вошёл:", user.uid);
  }
});

// авторасчет
function calculateTotal() {
  const subtotal = Number(document.getElementById("subtotal").value) || 0;
  const vat = Number(document.getElementById("vat").value) || 0;
  document.getElementById("total").value = subtotal + vat;
}

document.getElementById("subtotal").addEventListener("input", calculateTotal);
document.getElementById("vat").addEventListener("input", calculateTotal);

// создание фактуры
document.getElementById("createInvoiceBtn").addEventListener("click", async () => {

  const user = auth.currentUser;
  if (!user) {
    invoiceStatusMessage.textContent = "Сначала войдите ❗";
    return;
  }

  try {

    const clientData = {
      firstName: document.getElementById("firstName").value,
      lastName: document.getElementById("lastName").value,
      company: document.getElementById("company").value,
      street: document.getElementById("street").value,
      city: document.getElementById("city").value,
      zip: document.getElementById("zip").value,
      country: document.getElementById("country").value,
      vatId: document.getElementById("vatId").value
    };

    const invoiceData = {
      InvoiceNumber: document.getElementById("invoiceNumber").value,
      IssueDate: document.getElementById("issueDate").value,
      dueDate: document.getElementById("dueDate").value,
      client: clientData,
      subtotal: Number(document.getElementById("subtotal").value),
      vat: Number(document.getElementById("vat").value),
      total: Number(document.getElementById("total").value),
      status: document.getElementById("invoiceStatus").value,
      items: [],
      createdAt: new Date()
    };

    await addDoc(
      collection(db, "users", user.uid, "invoices"),
      invoiceData
    );

    invoiceStatusMessage.textContent = "Фактура создана ✅";

  } catch (error) {
    invoiceStatusMessage.textContent = error.message;
  }

});

</script>

</body>
</html>
