<!DOCTYPE html>
<html lang="cs">
<head>
  <nav style="background:#333;padding:10px;">
  <a href="index.html" class="nav-link" style="color:white;margin-right:15px;text-decoration:none;">Nová faktura</a>
  <a href="invoicelist.html" class="nav-link" style="color:white;text-decoration:none;">Seznam faktur</a>
    <a href="admin.html" class="nav-link" style="color:white;text-decoration:none;">Admin</a>
</nav>
<hr>

<script>
// Подсветка активной ссылки
const links = document.querySelectorAll(".nav-link");
links.forEach(link => {
  if (link.href === window.location.href) {
    link.style.fontWeight = "bold";
    link.style.textDecoration = "underline";
  }

</script>
<meta charset="UTF-8">
<title>Liza Accounting</title>
</head>
<body>

<h2>Registrace</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Heslo">
<button id="registerBtn">Registrovat</button>

<h2>Přihlášení</h2>
<button id="loginBtn">Přihlásit se</button>

<p id="authStatus"></p>

<hr>

<h2>Nová faktura</h2>

<input type="text" id="invoiceNumber" placeholder="Číslo faktury"><br><br>

<label>Datum vystavení:</label>
<input type="date" id="issueDate"><br><br>

<label>Datum splatnosti:</label>
<input type="date" id="dueDate"><br><br>

<label>Způsob platby:</label>
<select id="paymentMethod">
  <option value="Hotovost">Hotovost</option>
  <option value="Kartou">Kartou</option>
  <option value="Převodem na účet" selected>Převodem na účet</option>
</select>
<br><br>

<h3>Klient</h3>
<input type="text" id="firstName" placeholder="Jméno"><br>
<input type="text" id="lastName" placeholder="Příjmení"><br>
<input type="text" id="company" placeholder="Firma (pokud je)"><br><br>

<input type="text" id="street" placeholder="Ulice a číslo"><br><br>
<input type="text" id="city" placeholder="Město"><br><br>
<input type="text" id="zip" placeholder="PSČ"><br><br>
<input type="text" id="country" placeholder="Země"><br><br>
<input type="text" id="vatId" placeholder="DIČ / IČ"><br><br>

<hr>

<h3>Přidat službu</h3>

<label for="serviceName">Název služby:</label>
<input type="text" id="serviceName" placeholder="Název služby"><br><br>

<label for="serviceQty">Množství:</label>
<input type="number" id="serviceQty" placeholder="Množství" value="1"><br><br>

<label for="servicePrice">Cena:</label>
<input type="number" id="servicePrice" placeholder="Cena"><br><br>

<label for="serviceDiscount">Sleva %:</label>
<input type="number" id="serviceDiscount" placeholder="Sleva %" value="0"><br><br>

<button id="addItemBtn">Přidat</button>

<br><br>

<table border="1" id="itemsTable">
  <thead>
    <tr>
      <th>Služba</th>
      <th>Množství</th>
      <th>Cena (Kč)</th>
      <th>Sleva %</th>
      <th>Celkem (Kč)</th>
      <th>Odstranit</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<br>

<label>DPH %:</label>
<input type="number" id="vatPercent" value="21"><br><br>

<p>Mezisoučet: <span id="subtotal">0</span></p>
<p>DPH: <span id="vatAmount">0</span></p>
<p>Celkem: <span id="totalAmount">0</span></p>

<br>

<button id="createInvoiceBtn">Vytvořit fakturu</button>

<p id="invoiceStatusMessage"></p>

<script type="module">
// --- tady zůstává tvůj původní JS kód s Firebase, auth, fakturou a položkami ---
// jen textové hlášky (např. status) překládáme níže

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, addDoc } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNuCWtVCpC2HmkncirONfPEUpICHAFJc0",
  authDomain: "lizaaccounting-d48b7.firebaseapp.com",
  projectId: "lizaaccounting-d48b7",
  storageBucket: "lizaaccounting-d48b7.firebasestorage.app",
  messagingSenderId: "407944794362",
  appId: "1:407944794362:web:c646f7670a8717a3fab943"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let items = [];

// --- AUTH SECTION ---
onAuthStateChanged(auth, (user) => {
  const status = document.getElementById("authStatus");

  if (user) {
    status.textContent = "Přihlášen jako: " + user.email;
  } else {
    status.textContent = "Nepřihlášen";
  }
});

document.getElementById("registerBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await createUserWithEmailAndPassword(auth, email, password);
  } catch (error) {
    document.getElementById("authStatus").textContent = error.message;
  }
});

document.getElementById("loginBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (error) {
    document.getElementById("authStatus").textContent = error.message;
  }
});

// --- INVOICE LOGIC ---
function renderItems() {
  const tbody = document.querySelector("#itemsTable tbody");
  tbody.innerHTML = "";

  items.forEach((item, index) => {
    const row = `
      <tr>
        <td>${item.name}</td>
        <td>${item.quantity}</td>
        <td>${item.price.toFixed(2)} Kč</td>
        <td>${item.discount}%</td>
        <td>${item.total.toFixed(2)} Kč</td>
        <td><button onclick="removeItem(${index})">X</button></td>
      </tr>
    `;
    tbody.innerHTML += row;
  });

  calculateTotals();
}

window.removeItem = function(index) {
  items.splice(index, 1);
  renderItems();
};

function calculateTotals() {
  const subtotal = items.reduce((sum, item) => sum + item.total, 0);
  const vatPercent = Number(document.getElementById("vatPercent").value) || 0;
  const vatAmount = subtotal * vatPercent / 100;
  const total = subtotal + vatAmount;

  document.getElementById("subtotal").textContent = subtotal.toFixed(2) + " Kč";
  document.getElementById("vatAmount").textContent = vatAmount.toFixed(2) + " Kč";
  document.getElementById("totalAmount").textContent = total.toFixed(2) + " Kč";
}

document.getElementById("addItemBtn").addEventListener("click", () => {
  const name = document.getElementById("serviceName").value;
  const qty = Number(document.getElementById("serviceQty").value);
  const price = Number(document.getElementById("servicePrice").value);
  const discount = Number(document.getElementById("serviceDiscount").value) || 0;

  if (!name || !price) return;

  const total = qty * price * (1 - discount / 100);

  items.push({ name, quantity: qty, price, discount, total });

  renderItems();

  document.getElementById("serviceName").value = "";
  document.getElementById("serviceQty").value = 1;
  document.getElementById("servicePrice").value = "";
  document.getElementById("serviceDiscount").value = 0;
});

document.getElementById("vatPercent").addEventListener("input", calculateTotals);

document.getElementById("createInvoiceBtn").addEventListener("click", async () => {
  const user = auth.currentUser;
  if (!user) {
    alert("Přihlaste se prosím");
    return;
  }

  const subtotal = items.reduce((sum, item) => sum + item.total, 0);
  const vatPercent = Number(document.getElementById("vatPercent").value) || 0;
  const vatAmount = subtotal * vatPercent / 100;
  const total = subtotal + vatAmount;

  const clientData = {
    firstName: document.getElementById("firstName").value,
    lastName: document.getElementById("lastName").value,
    company: document.getElementById("company").value,
    street: document.getElementById("street").value,
    city: document.getElementById("city").value,
    zip: document.getElementById("zip").value,
    country: document.getElementById("country").value,
    vatId: document.getElementById("vatId").value
  };

  const invoiceData = {
    invoiceNumber: document.getElementById("invoiceNumber").value,
    issueDate: document.getElementById("issueDate").value,
    dueDate: document.getElementById("dueDate").value,
    client: clientData,
    items,
    subtotal,
    vatPercent,
    vatAmount,
    total,
    currency: "CZK",
    paymentMethod: document.getElementById("paymentMethod").value,
    status: "unpaid", 
    createdAt: new Date()
  };

  await addDoc(collection(db, "users", user.uid, "invoices"), invoiceData);

  document.getElementById("invoiceStatusMessage").textContent = "Faktura byla vytvořena ✅";
});

</script>

</body>
</html>
