<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Liza Accounting</title>
</head>
<body>

<h2>Регистрация</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Пароль">
<button id="registerBtn">Зарегистрироваться</button>

<h2>Логин</h2>
<button id="loginBtn">Войти</button>

<p id="authStatus"></p>

<hr>

<h2>Новая фактура</h2>

<input type="text" id="invoiceNumber" placeholder="Номер фактуры"><br><br>

<label>Дата выставления:</label>
<input type="date" id="issueDate"><br><br>

<label>Срок оплаты:</label>
<input type="date" id="dueDate"><br><br>

<input type="text" id="client" placeholder="Клиент"><br><br>

<input type="text" id="notes" placeholder="Примечание"><br><br>

<input type="number" id="subtotal" placeholder="Сумма без НДС"><br><br>

<input type="number" id="vat" placeholder="НДС"><br><br>

<input type="number" id="total" placeholder="Итого" readonly><br><br>

<select id="invoiceStatus">
  <option value="draft">Черновик</option>
  <option value="sent">Отправлена</option>
  <option value="paid">Оплачена</option>
</select><br><br>

<button id="createInvoiceBtn">Созить фактуру</button>

<p id="invoiceStatusMessage"></p>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { 
    getAuth, 
    createUserWithEmailAndPassword, 
    signInWithEmailAndPassword, 
    onAuthStateChanged 
  } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
  import { 
    getFirestore, 
    doc, 
    setDoc, 
    collection, 
    addDoc 
  } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBNuCWtVCpC2HmkncirONfPEUpICHAFJc0",
    authDomain: "lizaaccounting-d48b7.firebaseapp.com",
    projectId: "lizaaccounting-d48b7",
    storageBucket: "lizaaccounting-d48b7.firebasestorage.app",
    messagingSenderId: "407944794362",
    appId: "1:407944794362:web:c646f7670a8717a3fab943"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const authStatus = document.getElementById("authStatus");
  const invoiceStatusMessage = document.getElementById("invoiceStatusMessage");

  // 🔹 Регистрация
  document.getElementById("registerBtn").addEventListener("click", async () => {
    try {
      const userCredential = await createUserWithEmailAndPassword(
        auth,
        emailInput.value,
        passwordInput.value
      );

      const user = userCredential.user;

      await setDoc(doc(db, "users", user.uid), {
        email: user.email,
        createdAt: new Date()
      });

      authStatus.textContent = "Регистрация успешна ✅";
    } catch (error) {
      authStatus.textContent = error.message;
    }
  });

  // 🔹 Логин
  document.getElementById("loginBtn").addEventListener("click", async () => {
    try {
      await signInWithEmailAndPassword(
        auth,
        emailInput.value,
        passwordInput.value
      );

      authStatus.textContent = "Вход выполнен ✅";
    } catch (error) {
      authStatus.textContent = error.message;
    }
  });

  // 🔹 Проверка состояния авторизации
  onAuthStateChanged(auth, (user) => {
    if (user) {
      console.log("Пользователь вошёл:", user.uid);
    } else {
      console.log("Пользователь вышел");
    }
  });

  // 🔹 Авторасчет total
  const subtotalInput = document.getElementById("subtotal");
  const vatInput = document.getElementById("vat");
  const totalInput = document.getElementById("total");

  function calculateTotal() {
    const subtotal = Number(subtotalInput.value) || 0;
    const vat = Number(vatInput.value) || 0;
    totalInput.value = subtotal + vat;
  }

  subtotalInput.addEventListener("input", calculateTotal);
  vatInput.addEventListener("input", calculateTotal);

  // 🔹 Создание фактуры
  document.getElementById("createInvoiceBtn").addEventListener("click", async () => {

    const user = auth.currentUser;

    if (!user) {
      invoiceStatusMessage.textContent = "Сначала войдите в систему ❗";
      return;
    }

    try {
      const invoiceData = {
        InvoiceNumber: document.getElementById("invoiceNumber").value,
        IssueDate: document.getElementById("issueDate").value,
        dueDate: document.getElementById("dueDate").value,
        client: document.getElementById("client").value,
        Notes: document.getElementById("notes").value,
        subtotal: Number(subtotalInput.value),
        vat: Number(vatInput.value),
        total: Number(totalInput.value),
        status: document.getElementById("invoiceStatus").value,
        items: [],
        createdAt: new Date()
      };

      await addDoc(
        collection(db, "users", user.uid, "invoices"),
        invoiceData
      );

      invoiceStatusMessage.textContent = "Фактура создана ✅";

    } catch (error) {
      invoiceStatusMessage.textContent = error.message;
    }

  });

</script>

</body>
</html>
