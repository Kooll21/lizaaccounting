<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Seznam faktur</title>
   <link rel="stylesheet" href="styles.css">
  <nav style="background:#333;padding:10px;">
  <a href="index.html" class="nav-link" style="color:white;margin-right:15px;text-decoration:none;">Nová faktura</a>
  <a href="invoicelist.html" class="nav-link" style="color:white;text-decoration:none;">Seznam faktur</a>
    <a href="admin.html" class="nav-link" style="color:white;text-decoration:none;">Admin</a>
</nav>
<hr>

<script>
// Подсветка активной ссылки
const links = document.querySelectorAll(".nav-link");
links.forEach(link => {
  if (link.href === window.location.href) {
    link.style.fontWeight = "bold";
    link.style.textDecoration = "underline";
  }
});
</script>

</head>
<body>

<h2>Seznam faktur</h2>
<p id="authStatus"></p>
<table>
  <thead>
    <tr>
      <th>Klient</th>
      <th>Datum vystavení</th>
      <th>Datum splatnosti</th>
      <th>Celkem (Kč)</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="invoiceTableBody">
    <!-- faktury se načtou sem -->
  </tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNuCWtVCpC2HmkncirONfPEUpICHAFJc0",
  authDomain: "lizaaccounting-d48b7.firebaseapp.com",
  projectId: "lizaaccounting-d48b7",
  storageBucket: "lizaaccounting-d48b7.firebasestorage.app",
  messagingSenderId: "407944794362",
  appId: "1:407944794362:web:c646f7670a8717a3fab943"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const authStatus = document.getElementById("authStatus");
const invoiceTableBody = document.getElementById("invoiceTableBody");

onAuthStateChanged(auth, async (user) => {
  if (user) {
    authStatus.textContent = "Přihlášen jako: " + user.email;
    await loadInvoices(user.uid);
  } else {
    authStatus.textContent = "Nepřihlášen. Prosím přihlašte se.";
    invoiceTableBody.innerHTML = "";
    // Здесь можно добавить простой prompt для логина
    const email = prompt("Zadejte email:");
    const password = prompt("Zadejte heslo:");
    if (email && password) {
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (err) {
        alert("Chyba přihlášení: " + err.message);
      }
    }
  }
});

async function loadInvoices(uid) {
  const invoicesRef = collection(db, "users", uid, "invoices");
  const snapshot = await getDocs(invoicesRef);

  invoiceTableBody.innerHTML = ""; // очистка таблицы

  snapshot.forEach(docSnap => {
    const invoice = docSnap.data();
    const clientName = invoice.client.firstName + " " + invoice.client.lastName;
    const issueDate = invoice.issueDate || "";
    const dueDate = invoice.dueDate || "";
    const total = invoice.total ? invoice.total.toFixed(2) : "0.00";
    const status = invoice.status || "unpaid";

    const row = document.createElement("tr");
    row.setAttribute("data-id", docSnap.id);
    row.style.cursor = "pointer";
    row.innerHTML = `
      <td>${clientName}</td>
      <td>${issueDate}</td>
      <td>${dueDate}</td>
      <td>${total} Kč</td>
      <td>${status}</td>
    `;

    row.addEventListener("click", () => {
      const invoiceId = docSnap.id;
      window.location.href = `invoicedetails.html?invoiceId=${invoiceId}`;
    });

    invoiceTableBody.appendChild(row);
  });
}
  
</script>

</body>
</html>
