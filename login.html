<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Přihlášení</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h2>Přihlášení</h2>

<div class="section-card">
<label>Email</label>
<input type="email" id="email">

<label>Heslo</label>
<input type="password" id="password">

<button id="loginBtn">Přihlásit</button>

<p>Nemáte účet?</p>
<a href="register.html">Registrace</a>

<p id="loginMessage"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
 apiKey: "AIzaSyBNuCWtVCpC2HmkncirONfPEUpICHAFJc0",
 authDomain: "lizaaccounting-d48b7.firebaseapp.com",
 projectId: "lizaaccounting-d48b7",
 storageBucket: "lizaaccounting-d48b7.firebasestorage.app",
 messagingSenderId: "407944794362",
 appId: "1:407944794362:web:c646f7670a8717a3fab943"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("loginBtn").addEventListener("click", async () => {

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try{

await signInWithEmailAndPassword(auth,email,password);

window.location = "index.html";

}catch(err){

document.getElementById("loginMessage").textContent = err.message;

}

});

</script>

</body>
</html>
