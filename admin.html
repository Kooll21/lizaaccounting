<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Můj profil</title>

<style>
body{
    font-family:Arial;
    margin:0;
    background:#f4f4f4;
}

.container{
    padding:20px;
    max-width:600px;
    margin:auto;
    background:white;
    margin-top:30px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input, select{
    width:100%;
    padding:8px;
    margin-top:5px;
    box-sizing:border-box;
}

button{
    margin-top:20px;
    padding:10px 15px;
    background:#2c7be5;
    border:none;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1a5ec8;
}
</style>

</head>

<body>

<nav style="background:#333;padding:10px;">
<a href="index.html" style="color:white;margin-right:15px;text-decoration:none;">Nová faktura</a>
<a href="invoicelist.html" style="color:white;margin-right:15px;text-decoration:none;">Seznam faktur</a>
<a href="admin.html" style="color:white;text-decoration:none;">Můj profil</a>
</nav>

<div class="container">

<h2>Můj profil</h2>

<label>Jméno</label>
<input id="name">

<label>Příjmení</label>
<input id="surname">

<label>Email</label>
<input id="email" disabled>

<label>DIČ/IČ</label>
<input id="dicic">

<label>DPH status</label>
<select id="dphstatus">
    <!-- možnosti budou doplněny JS -->
</select>

<h3>Adresa</h3>

<label>PSČ</label>
<input id="psc">

<label>Město</label>
<input id="mesto">

<label>Ulice</label>
<input id="ulice">

<label>Číslo orientační</label>
<input id="cisloorientacni">

<label>Číslo popisné</label>
<input id="cislopopisne">

<h3>Platební údaje</h3>

<label>Číslo účtu</label>
<input id="accountnumber">

<label>Kód banky</label>
<input id="bankcode">

<label>IBAN</label>
<input id="iban" readonly placeholder="IBAN se vygeneruje automaticky">

<button onclick="saveProfile()">Uložit změny</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBNuCWtVCpC2HmkncirONfPEUpICHAFJc0",
    authDomain: "lizaaccounting-d48b7.firebaseapp.com",
    projectId: "lizaaccounting-d48b7",
    storageBucket: "lizaaccounting-d48b7.firebasestorage.app",
    messagingSenderId: "407944794362",
    appId: "1:407944794362:web:c646f7670a8717a3fab943"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUID = null;

onAuthStateChanged(auth, async (user) => {

    if(!user){
        alert("Musíte být přihlášen");
        window.location="login.html";
        return;
    }

    currentUID = user.uid;
    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);

    if(!snap.exists()){
        alert("Profil neexistuje");
        return;
    }

    const data = snap.data();

    // Načtení jména a příjmení
    document.getElementById("name").value = data.name || "";
    document.getElementById("surname").value = data.surname || "";

    document.getElementById("email").value = data.email || "";
    document.getElementById("dicic").value = data.DICIC || "";
    document.getElementById("psc").value = data.PSC || "";
    document.getElementById("mesto").value = data.mesto || "";
    document.getElementById("ulice").value = data.ulice || "";
    document.getElementById("cisloorientacni").value = data.cisloorientacni || "";
    document.getElementById("cislopopisne").value = data.cislopopisne || "";

    // Naplnění DPH select
    const dphSelect = document.getElementById("dphstatus");
    dphSelect.innerHTML = ""; // vyčistit možnosti

    if(!data.DPHstatus){ 
        const options = ["Plátce DPH", "Neplátce DPH"];
        options.forEach(opt => {
            const el = document.createElement("option");
            el.value = opt;
            el.text = opt;
            dphSelect.appendChild(el);
        });
    } else {
        const current = document.createElement("option");
        current.value = data.DPHstatus;
        current.text = data.DPHstatus;
        current.selected = true;
        dphSelect.appendChild(current);

        const other = data.DPHstatus === "Plátce DPH" ? "Neplátce DPH" : "Plátce DPH";
        const otherOpt = document.createElement("option");
        otherOpt.value = other;
        otherOpt.text = other;
        dphSelect.appendChild(otherOpt);
    }

    // Naplnění platebních údajů
    document.getElementById("accountnumber").value = data.accountnumber || "";
    document.getElementById("bankcode").value = data.bankcode || "";
    document.getElementById("iban").value = data.IBAN || "";

});

// Funkce pro generování českého IBAN
function generateIBAN(accountNumber, bankCode){
    if(!accountNumber || !bankCode) return "";

    accountNumber = accountNumber.replace(/\s+/g,"").padStart(16,"0");
    bankCode = bankCode.padStart(4,"0");

    const countryCode = "CZ";
    const countryNumeric = "1235"; // C=12, Z=35

    const bban = bankCode + accountNumber;
    const checkString = bban + countryNumeric + "00";

    const mod97 = BigInt(checkString) % 97n;
    const checkDigits = (98n - mod97).toString().padStart(2,"0");

    return `${countryCode}${checkDigits}${bankCode}${accountNumber}`;
}

// Automatické generování IBAN při změně accountnumber nebo bankcode
document.getElementById("accountnumber").addEventListener("input", updateIBAN);
document.getElementById("bankcode").addEventListener("input", updateIBAN);

function updateIBAN(){
    const acc = document.getElementById("accountnumber").value;
    const code = document.getElementById("bankcode").value;
    document.getElementById("iban").value = generateIBAN(acc, code);
}

window.saveProfile = async function(){

    const ref = doc(db,"users",currentUID);

    await updateDoc(ref, {
        name: document.getElementById("name").value,
        surname: document.getElementById("surname").value,
        DICIC: document.getElementById("dicic").value,
        DPHstatus: document.getElementById("dphstatus").value,
        PSC: document.getElementById("psc").value,
        mesto: document.getElementById("mesto").value,
        ulice: document.getElementById("ulice").value,
        cisloorientacni: document.getElementById("cisloorientacni").value,
        cislopopisne: document.getElementById("cislopopisne").value,
        accountnumber: document.getElementById("accountnumber").value,
        bankcode: document.getElementById("bankcode").value,
        IBAN: document.getElementById("iban").value
    });

    alert("Profil uložen");
}

</script>

</body>
</html>
