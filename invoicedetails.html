<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Detail faktury</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  nav { background:#333; padding:10px; }
  nav a { color:white; margin-right:15px; text-decoration:none; }
  input, select, button { margin: 5px 0; padding: 5px; width: 100%; max-width: 400px; }
  table { border-collapse: collapse; width: 80%; margin-top: 10px; }
  th, td { border: 1px solid #999; padding: 8px; text-align: left; }
  th { background-color: #f2f2f2; }
</style>
</head>
<body>

<nav>
  <a href="index.html">Nová faktura</a>
  <a href="invoicelist.html">Seznam faktur</a>
</nav>
<hr>

<h2>Detail faktury</h2>
<p id="authStatus"></p>

<h3>Informace o faktuře</h3>
<label>Číslo faktury:</label>
<input type="text" id="invoiceNumber">
<label>Datum vystavení:</label>
<input type="date" id="issueDate">
<label>Datum splatnosti:</label>
<input type="date" id="dueDate">
<label>Způsob platby:</label>
<select id="paymentMethod">
  <option value="Hotovost">Hotovost</option>
  <option value="Kartou">Kartou</option>
  <option value="Prevodem na ucet">Převodem na účet</option>
</select>
<label>Status:</label>
<select id="status">
  <option value="unpaid">Unpaid</option>
  <option value="paid">Paid</option>
  <option value="overdue">Overdue</option>
</select>

<h3>Klient</h3>
<input type="text" id="firstName" placeholder="Jméno">
<input type="text" id="lastName" placeholder="Příjmení">
<input type="text" id="company" placeholder="Firma">
<input type="text" id="street" placeholder="Ulice a číslo">
<input type="text" id="city" placeholder="Město">
<input type="text" id="zip" placeholder="PSČ">
<input type="text" id="country" placeholder="Země">
<input type="text" id="vatId" placeholder="DIČ / IČ">

<h3>Položky faktury</h3>
<table>
  <thead>
    <tr>
      <th>Název služby</th>
      <th>Množství</th>
      <th>Cena</th>
      <th>Sleva %</th>
      <th>Celkem</th>
    </tr>
  </thead>
  <tbody id="itemsTableBody"></tbody>
</table>

<label>DPH %:</label>
<input type="number" id="vatPercent">

<p>Mezisoučet: <span id="subtotal">0</span></p>
<p>DPH: <span id="vatAmount">0</span></p>
<p>Celkem: <span id="totalAmount">0</span></p>

<button id="downloadPdfBtn">Stáhnout PDF</button>

<!-- jsPDF и autoTable -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<!-- кастомный шрифт Roboto -->
<script src="Roboto-Regular-normal.js"></script>

<script>
const { jsPDF } = window.jspdf;

document.getElementById("downloadPdfBtn").addEventListener("click", () => {
  const doc = new jsPDF();

  // --- Подключаем кастомный шрифт ---
  doc.addFileToVFS("Roboto-Regular.ttf", RobotoRegular); // RobotoRegular из Roboto-Regular-normal.js
  doc.addFont("Roboto-Regular.ttf", "Roboto", "normal");
  doc.setFont("Roboto");

  doc.setFontSize(20);
  doc.text("Faktura", 105, 20, { align: "center" });

  doc.setFontSize(12);
  // Продавец
  doc.text("Vystavuje:", 14, 35);
  doc.text("Jelizaveta Lebeděva", 14, 42);
  doc.text("Ocelařska 975/45", 14, 48);
  doc.text("19000, Praha 9", 14, 54);

  // Клиент
  const clientName = document.getElementById("firstName").value + " " + document.getElementById("lastName").value;
  doc.text("Klient:", 130, 35);
  doc.text(clientName, 130, 42);
  doc.text(document.getElementById("company").value, 130, 48);
  doc.text(document.getElementById("street").value, 130, 54);
  doc.text(document.getElementById("zip").value + ", " + document.getElementById("city").value, 130, 60);
  doc.text(document.getElementById("country").value, 130, 66);
  doc.text("DIČ/IČ: " + document.getElementById("vatId").value, 130, 72);

  // Дата, номер, способ оплаты
  doc.text("Číslo faktury: " + document.getElementById("invoiceNumber").value, 14, 85);
  doc.text("Datum vystavení: " + document.getElementById("issueDate").value, 14, 92);
  doc.text("Datum splatnosti: " + document.getElementById("dueDate").value, 14, 99);
  doc.text("Způsob platby: " + document.getElementById("paymentMethod").value, 14, 106);
  doc.text("Status: " + document.getElementById("status").value, 14, 113);

  // Таблица через autoTable
  const rows = [];
  document.querySelectorAll("#itemsTableBody tr").forEach(row => {
    const inputs = row.querySelectorAll("input");
    const name = inputs[0].value;
    const quantity = inputs[1].value;
    const price = inputs[2].value;
    const discount = inputs[3].value;
    const total = (quantity * price * (1 - discount/100)).toFixed(2);
    rows.push([name, quantity, price, discount, total]);
  });

  doc.autoTable({
    head: [['Služba', 'Množství', 'Cena', 'Sleva %', 'Celkem']],
    body: rows,
    startY: 120,
    theme: 'grid',
    headStyles: { fillColor: [230, 230, 230] },
    styles: { font: "Roboto", fontSize: 11 }
  });

  // Итоги
  let finalY = doc.lastAutoTable.finalY + 10;
  doc.text("Mezisoučet: " + document.getElementById("subtotal").textContent + " Kč", 140, finalY);
  finalY += 6;
  doc.text("DPH: " + document.getElementById("vatAmount").textContent + " Kč", 140, finalY);
  finalY += 6;
  doc.text("Celkem: " + document.getElementById("totalAmount").textContent + " Kč", 140, finalY);

  // Сохраняем PDF
  const invoiceNumber = document.getElementById("invoiceNumber").value || "invoice";
  doc.save(`Faktura_${invoiceNumber}.pdf`);
});
</script>
</body>
</html>
