<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Nová faktura - Liza Accounting</title>
 <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="nav-container"></div>

  <script type="module">
    const container = document.getElementById("nav-container");
    const html = await fetch("nav.html").then(r => r.text());
    container.innerHTML = html;

    // После того как HTML меню вставлен — подключаем логику
    const { initNavAuth } = await import("./nav.js");
    initNavAuth();
  </script>

<h2>Nová faktura</h2>
<p id="authStatus"></p>
<div class="section-card">
<input type="text" id="invoiceNumber" placeholder="Číslo faktury">
<label>Datum vystavení:</label>
<input type="date" id="issueDate">
<label>Datum splatnosti:</label>
<input type="date" id="dueDate">
<label>Způsob platby:</label>
<select id="paymentMethod">
  <option value="Hotovost">Hotovost</option>
  <option value="Kartou">Kartou</option>
  <option value="Převodem na účet" selected>Převodem na účet</option>
</select>
</div>

 <div class="section-card">
<h3>Klient</h3>
<input type="text" id="firstName" placeholder="Jméno">
<input type="text" id="lastName" placeholder="Příjmení">
<input type="text" id="company" placeholder="Firma (pokud je)">
<input type="text" id="street" placeholder="Ulice a číslo">
<input type="text" id="city" placeholder="Město">
<input type="text" id="zip" placeholder="PSČ">
<input type="text" id="country" placeholder="Země">
<input type="text" id="vatId" placeholder="DIČ / IČ">


</div>

 
<div class="section-card">
<h3>Přidat službu</h3>
<label for="serviceTemplate">Vyber službu ze šablon:</label>
<select id="serviceTemplate">
  <option value="">-- vyber službu --</option>
</select>
<button id="loadServiceBtn">Načíst do formuláře</button>

<label for="serviceName">Název služby:</label>
<input type="text" id="serviceName" placeholder="Název služby">

<label for="serviceQty">Množství:</label>
<input type="number" id="serviceQty" value="1">

<label for="servicePrice">Cena:</label>
<input type="number" id="servicePrice">

<label for="serviceDiscount">Sleva %:</label>
<input type="number" id="serviceDiscount" value="0">

<button id="addItemBtn">Přidat do faktury</button>
<button id="saveServiceTemplateBtn">Uložit tuto službu do šablon</button>
</div>


 <div class="section-card">
<table id="itemsTable">
  <thead>
    <tr>
      <th>Služba</th>
      <th>Množství</th>
      <th>Cena (Kč)</th>
      <th>Sleva %</th>
      <th>Celkem (Kč)</th>
      <th>Odstranit</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<label>DPH %:</label>
<input type="number" id="vatPercent" value="21">

<p>Mezisoučet: <span id="subtotal">0</span></p>
<p>DPH: <span id="vatAmount">0</span></p>
<p>Celkem: <span id="totalAmount">0</span></p>

<button id="createInvoiceBtn">Vytvořit fakturu</button>
<p id="invoiceStatusMessage"></p>
</div>
 
<script type="module">
import {
  auth, db,
  onAuthStateChanged,
  collection, doc, getDoc, getDocs, setDoc, addDoc
} from "./firebase.js";

/* ---------------- GLOBAL ---------------- */
let items = [];
let serviceTemplates = {};

/* ---------- Date fix helper ---------- */
function fixDate(d) {
  if (!d) return "";
  if (typeof d === "string") return d;
  if (d.toDate) return d.toDate().toISOString().slice(0, 10);
  return "";
}

/* ---------------- LOAD COPIED INVOICE ---------------- */
async function loadCopiedInvoice() {
  const params = new URLSearchParams(window.location.search);
  const copyId = params.get("copyId");
  if (!copyId) return;

  const user = auth.currentUser;
  if (!user) return;

  const invoiceRef = doc(db, "users", user.uid, "invoices", copyId);
  const snap = await getDoc(invoiceRef);
  if (!snap.exists()) return;

  const data = snap.data();

  document.getElementById("invoiceNumber").value =
    (data.invoiceNumber || "") + "-copy";

  document.getElementById("issueDate").value = fixDate(data.issueDate);
  document.getElementById("dueDate").value  = fixDate(data.dueDate);
  document.getElementById("paymentMethod").value = data.paymentMethod || "Převodem na účet";

  const client = data.client || {};
  document.getElementById("firstName").value = client.firstName || "";
  document.getElementById("lastName").value  = client.lastName  || "";
  document.getElementById("company").value   = client.company   || "";
  document.getElementById("street").value    = client.street    || "";
  document.getElementById("city").value      = client.city      || "";
  document.getElementById("zip").value       = client.zip       || "";
  document.getElementById("country").value   = client.country   || "";
  document.getElementById("vatId").value     = client.vatId     || "";

  items = Array.isArray(data.items) ? data.items : [];
  renderItems();
}

/* ---------------- ITEMS RENDER ---------------- */
function renderItems() {
  const tbody = document.querySelector("#itemsTable tbody");
  tbody.innerHTML = "";
  items.forEach((item, index) => {
    tbody.innerHTML += `
      <tr>
        <td>${item.name}</td>
        <td>${item.quantity}</td>
        <td>${item.price.toFixed(2)} Kč</td>
        <td>${item.discount}%</td>
        <td>${item.total.toFixed(2)} Kč</td>
        <td><button onclick="removeItem(${index})">X</button></td>
      </tr>`;
  });
  calculateTotals();
}

window.removeItem = function(index) {
  items.splice(index, 1);
  renderItems();
};

function calculateTotals() {
  const subtotal = items.reduce((sum, item) => sum + item.total, 0);
  const vatPercent = Number(document.getElementById("vatPercent").value) || 0;
  const vatAmount = subtotal * vatPercent / 100;
  const total = subtotal + vatAmount;

  document.getElementById("subtotal").textContent = subtotal.toFixed(2) + " Kč";
  document.getElementById("vatAmount").textContent = vatAmount.toFixed(2) + " Kč";
  document.getElementById("totalAmount").textContent = total.toFixed(2) + " Kč";
}

/* ---------------- AUTH + LOAD DATA ---------------- */

onAuthStateChanged(auth, async (user) => {
  const status = document.getElementById("authStatus");

  if (!user) {
    status.textContent = "Nepřihlášen";
    return;
  }

  status.textContent = "Přihlášen jako: " + user.email;

  /* 1) Load user DPH */
  const userDocRef = doc(db, "users", user.uid);
  const userSnap = await getDoc(userDocRef);

  if (userSnap.exists()) {
    const d = userSnap.data();
    document.getElementById("vatPercent").value =
      d.DPHstatus === "Plátce DPH" ? 21 : 0;
    calculateTotals();
  }

  /* 2) Load service templates */
  const servicesCol = collection(db, "users", user.uid, "services");
  const snapshot = await getDocs(servicesCol);

  serviceTemplates = {};
  const select = document.getElementById("serviceTemplate");
  select.innerHTML = `<option value="">-- vyber službu --</option>`;

  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    serviceTemplates[docSnap.id] = data;

    const opt = document.createElement("option");
    opt.value = docSnap.id;
    opt.textContent = `${data.servicename} (${data.price} Kč)`;
    select.appendChild(opt);
  });

  /* 3) Load copied invoice (if copyId exists) */
  await loadCopiedInvoice();
});

/* ---------------- ADD SERVICE ITEM ---------------- */
document.getElementById("addItemBtn").addEventListener("click", () => {
  const name = document.getElementById("serviceName").value.trim();
  const qty = Number(document.getElementById("serviceQty").value);
  const price = Number(document.getElementById("servicePrice").value);
  const discount = Number(document.getElementById("serviceDiscount").value) || 0;

  if (!name || !price) return;

  const total = qty * price * (1 - discount / 100);

  items.push({ name, quantity: qty, price, discount, total });
  renderItems();

  document.getElementById("serviceName").value = "";
  document.getElementById("serviceQty").value = 1;
  document.getElementById("servicePrice").value = "";
  document.getElementById("serviceDiscount").value = 0;
});

document.getElementById("vatPercent").addEventListener("input", calculateTotals);

/* ---------------- LOAD TEMPLATE INTO FORM ---------------- */
document.getElementById("loadServiceBtn").addEventListener("click", () => {
  const serviceId = document.getElementById("serviceTemplate").value;
  if (!serviceId) return;

  const service = serviceTemplates[serviceId];
  document.getElementById("serviceName").value = service.servicename;
  document.getElementById("servicePrice").value = service.price;
  document.getElementById("serviceQty").value = 1;
  document.getElementById("serviceDiscount").value = 0;
});

/* ---------------- SAVE SERVICE TEMPLATE ---------------- */
document.getElementById("saveServiceTemplateBtn").addEventListener("click", async () => {
  const user = auth.currentUser;
  if (!user) return;

  const name = document.getElementById("serviceName").value.trim();
  const price = Number(document.getElementById("servicePrice").value);

  if (!name || isNaN(price)) {
    alert("Vyplňte název a cenu služby");
    return;
  }

  const id = crypto.randomUUID();
  await setDoc(doc(db, "users", user.uid, "services", id), {
    servicename: name,
    price: price
  });

  alert("Služba byla uložena");

  // reload templates
  const servicesCol = collection(db, "users", user.uid, "services");
  const snapshot = await getDocs(servicesCol);
  serviceTemplates = {};

  const select = document.getElementById("serviceTemplate");
  select.innerHTML = `<option value="">-- vyber službu --</option>`;

  snapshot.forEach(docSnap => {
    const d = docSnap.data();
    serviceTemplates[docSnap.id] = d;

    const opt = document.createElement("option");
    opt.value = docSnap.id;
    opt.textContent = `${d.servicename} (${d.price} Kč)`;
    select.appendChild(opt);
  });
});

/* ---------------- CREATE INVOICE ---------------- */
document.getElementById("createInvoiceBtn").addEventListener("click", async () => {
  const user = auth.currentUser;
  if (!user) {
    alert("Přihlaste se prosím");
    return;
  }

  const subtotal = items.reduce((sum, it) => sum + it.total, 0);
  const vatPercent = Number(document.getElementById("vatPercent").value) || 0;
  const vatAmount = subtotal * vatPercent / 100;
  const total = subtotal + vatAmount;

  const clientData = {
    firstName: document.getElementById("firstName").value,
    lastName:  document.getElementById("lastName").value,
    company:   document.getElementById("company").value,
    street:    document.getElementById("street").value,
    city:      document.getElementById("city").value,
    zip:       document.getElementById("zip").value,
    country:   document.getElementById("country").value,
    vatId:     document.getElementById("vatId").value
  };

  const invoiceData = {
    invoiceNumber: document.getElementById("invoiceNumber").value,
    issueDate:     document.getElementById("issueDate").value,
    dueDate:       document.getElementById("dueDate").value,
    client:        clientData,
    items,
    subtotal, vatPercent, vatAmount, total,
    currency: "CZK",
    paymentMethod: document.getElementById("paymentMethod").value,
    status: "unpaid",
    createdAt: new Date()
  };

  await addDoc(collection(db, "users", user.uid, "invoices"), invoiceData);

  document.getElementById("invoiceStatusMessage").textContent =
    "Faktura byla vytvořena ✔️";

  items = [];
  renderItems();
});
</script>

</body>

</html>
